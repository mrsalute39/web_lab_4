<!DOCTYPE html>
<html>
<head>
    <title>Форма</title>
</head>
<body>
    <form id="Quiz">
		<input type="text" name="username" placeholder="Введите имя">
		<input type="number" name="userage" placeholder="Введите возраст">
		<select name="theme" placeholder="Желаемая тема">
			<option value="games">Игры за 100</option>
			<option value="books">Книги за 200</option>
			<option value="humour">Шутки за 300</option>
		</select>
		<input type="checkbox" name="prize_bool"> Нужен приз?<br>
		<input type="radio" name="difficulty" value="0"> Легко
		<input type="radio" name="difficulty" value="1"> Норм
		<input type="radio" name="difficulty" value="2"> Прикладной математик<br>
		<button type="submit">Отправить</button>
	</form>
    <script src="script.js"></script>
</body>
</html>
