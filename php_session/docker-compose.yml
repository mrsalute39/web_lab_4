services:
    php:
        image: php:8.2-fpm
        container_name: lab3_php
        volumes:
            - ./www:/var/www/html
        expose:
            - "9000"
    nginx:
        image: nginx:1.27-alpine
        ports:
            - "8080:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./www:/var/www/html
        depends_on:
            - php